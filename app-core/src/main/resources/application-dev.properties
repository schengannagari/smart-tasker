server.port=8089
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://192.168.64.2:3306/mydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:appuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:appuser}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

myapp.local.app.admin.credentials.secret.key=my-app-secret
cloud.aws.credentials.profile-name=local-app
cloud.aws.region.static=us-east-1
logging.level.com.sc=debug
logging.level.org.springframework.security=debug