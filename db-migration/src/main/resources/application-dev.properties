spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://cockroachdb:26257/mydb?sslmode=verify-full&sslrootcert=/app/certs/ca.crt}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:appuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:appuser}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.enabled=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.debug=true
spring.liquibase.logging=debug
