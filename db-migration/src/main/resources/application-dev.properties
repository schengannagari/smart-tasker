spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://192.168.64.2:3306/mydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:appuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:appuser}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.enabled=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.debug=true
spring.liquibase.logging=debug



