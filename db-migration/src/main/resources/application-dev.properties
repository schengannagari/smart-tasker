spring.datasource.url=jdbc:mysql://192.168.64.2:3306/mydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=appuser
spring.datasource.password=appuser
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.enabled=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.debug=true
spring.liquibase.logging=debug
